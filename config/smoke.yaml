# Real smoke-test config: a 2-model council on the cheap Azure AI Foundry
# OpenAI-compatible models (DeepSeek-V4-Pro + Kimi-K2.6). Used by the live run.
models:
  DeepSeek-V4-Pro:
    env_prefix: DEEPSEEK_V4_PRO
    litellm_provider: azure_ai
    context_window: 128000
    tier: cheap
  Kimi-K2.6:
    env_prefix: KIMI_K2_6
    litellm_provider: azure_ai
    context_window: 256000
    tier: cheap

gateway:
  provider: openai_compatible
  request_timeout_s: 90
  max_retries: 1
  backoff_base_s: 0.5
  circuit_breaker: { fail_threshold: 5, reset_after_s: 30 }

router:
  router_model: Kimi-K2.6
  default_decision: single_model
  budgets: { per_request_usd: 5.0, per_user_daily_usd: 50.0, latency_budget_s: 180 }

council:
  proposers: [DeepSeek-V4-Pro, Kimi-K2.6]
  quorum: 2
  judges: proposers
  ranking: { method: borda, orderings_per_judge: 2, anonymize: true }
  debate: { enabled: false }
  voting: { enabled: true, tie_break_by_quality_order: true }
  chairman: { model: DeepSeek-V4-Pro, structured_output: true, max_output_tokens: 1024 }

class_routing:
  trivial: single_model
  standard: single_model
  high_stakes: council
  verifiable_reasoning: council_with_voting

cache: { exact_match: false }
guardrails: { safety_check: true, pii_scan: true, verify_faithfulness: true }
observability: { langfuse: false, otel: false, prometheus_metrics: true }

pricing_usd_per_1k_tokens:
  DeepSeek-V4-Pro: { input: 0.0, output: 0.0 }
  Kimi-K2.6: { input: 0.0, output: 0.0 }
