services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: council
      POSTGRES_PASSWORD: council
      POSTGRES_DB: ai_council
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U council"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Optional: self-hosted tracing. Enable observability.langfuse in config and
  # set LANGFUSE_* in .env to use it.
  langfuse:
    image: langfuse/langfuse:2
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://council:council@postgres:5432/ai_council
      NEXTAUTH_SECRET: change-me-in-prod
      SALT: change-me-in-prod
      NEXTAUTH_URL: http://localhost:3001
    ports:
      - "3001:3000"

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://council:council@postgres:5432/ai_council
      REDIS_URL: redis://redis:6379/0
      AI_COUNCIL_CONFIG_PATH: config/default.yaml
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build: ./frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  postgres-data:
